name: Running Python file test action 

on: push


jobs:
  Runingjobname:
    runs-on: ubuntu-latest
    steps:
    - name: clone repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        Python-version: '3.10'

    - name: Run a python script
      run: python python.py

